# WHAT THIS VIDEO COVERS:
#   A self-hosted runner is YOUR own machine acting as the
#   computer that runs GitHub Actions jobs.
#
#   Instead of installing software directly on your computer,
#   we'll use Docker — which runs everything in a safe,
#   isolated container. Much cleaner!
#
# ──────────────────────────────────────────────────────────────
# BEFORE YOU START — Install these two things:
# ──────────────────────────────────────────────────────────────
#   1. Docker Desktop  → https://www.docker.com/products/docker-desktop
#   2. Git             → https://git-scm.com
#
# ──────────────────────────────────────────────────────────────
# STEP-BY-STEP SETUP (do these ONCE before using this workflow)
# ──────────────────────────────────────────────────────────────
#
#  STEP 1 — Get your GitHub Personal Access Token (PAT)
#  ────────────────────────────────────────────────────
#   1. Go to: github.com → Click your profile picture → Settings
#   2. Scroll down → Click "Developer settings" (bottom of left sidebar)
#   3. Click "Personal access tokens" → "Tokens (classic)"
#   4. Click "Generate new token (classic)"
#   5. Give it a name: "self-hosted-runner"
#   6. Set expiration: 90 days (or No expiration for learning)
#   7. Check these scopes: ✅ repo   ✅ workflow
#   8. Click "Generate token"
#   9. COPY the token — you only see it ONCE! Starts with: ghp_
#
#  STEP 2 — Create a folder on your computer
#  ──────────────────────────────────────────
#   Open your terminal and run:
#     mkdir my-runner
#     cd my-runner
#
#  STEP 3 — Create 3 files in that folder:
#  ────────────────────────────────────────
#   Files needed:
#     Dockerfile        ← defines the machine
#     start.sh          ← registers with GitHub
#     docker-compose.yml ← easy way to run it
#
#   (All 3 files are shown below in the APPENDIX section)
#
#  STEP 4 — Create your .env file (your secrets — never commit this!)
#  ──────────────────────────────────────────────────────────────────
#   In the same folder, create a file called: .env
#   Paste this inside (fill in YOUR values):
#
#     GITHUB_TOKEN=ghp_your_token_here
#     REPO_URL=https://github.com/your-username/your-repo
#
#  STEP 5 — Build and Start the Runner
#  ─────────────────────────────────────
#   In your terminal, inside the my-runner folder, run:
#
#     docker compose up --build
#
#   You'll see something like:
#     ✅ Got registration token
#     ✅ Runner configured
#     🚀 Runner is ONLINE — waiting for jobs...
#
#  STEP 6 — Verify it's connected to GitHub
#  ─────────────────────────────────────────
#   1. Go to your GitHub repo
#   2. Click Settings → Actions → Runners
#   3. You should see your runner listed as "Idle" (green dot) ✅
#
#  STEP 7 — Use it in a workflow!
#  ────────────────────────────────
#   In any workflow file, change:
#     runs-on: ubuntu-latest
#   to:
#     runs-on: self-hosted
#
# ──────────────────────────────────────────────────────────────
# STOPPING THE RUNNER
# ──────────────────────────────────────────────────────────────
#   Press Ctrl+C in the terminal, or run:
#     docker compose down
#   This automatically deregisters the runner from GitHub.
#
# ============================================================

# ── THIS IS THE WORKFLOW THAT USES YOUR SELF-HOSTED RUNNER ──
# Save this as: .github/workflows/use-self-hosted-runner.yml
# in your GitHub repository.

name: Use My Self-Hosted Runner

on:
  workflow_dispatch:   # Run manually from GitHub UI to test it

jobs:
  run-on-my-machine:
    name: "Run on Self-Hosted Docker Runner"
    runs-on: self-hosted   # ← Uses YOUR Docker container as the runner

    steps:
      - name: Checkout my code
        uses: actions/checkout@v4

      - name: Prove this is my own machine
        run: |
          echo "==============================="
          echo "  Running on my own machine!"
          echo "==============================="
          echo "Hostname : $(hostname)"
          echo "User     : $(whoami)"
          echo "OS       : $(lsb_release -d | cut -f2)"

      - name: Show Node.js version (installed in Dockerfile)
        run: node --version

      - name: Run a simple test
        run: |
          echo "✅ Self-hosted runner is working!"
          echo "   Your code is now running on your own computer."



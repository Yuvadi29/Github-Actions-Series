# There are 3 things you'll use all the time:
#
#  1. VARIABLES  → Store non-sensitive config values
#                  Example: APP_NAME, NODE_VERSION
#                  Set at: Settings → Secrets and Variables → Variables
#
#  2. SECRETS    → Store sensitive values like passwords and API keys
#                  Example: DATABASE_PASSWORD, API_KEY
#                  Set at: Settings → Secrets and Variables → Secrets
#
#  3. INPUTS     → Values the user types in when running the workflow manually
#                  Example: "Which environment should I deploy to?"
#
# ============================================================

name: Variables, Secrets and Inputs

# This workflow only runs when you click "Run workflow" manually
# The "inputs" section defines what questions to ask the user
on:
  workflow_dispatch:
    inputs:

      # Input 1 — a dropdown with fixed choices
      environment:
        description: "Which environment do you want to deploy to?"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: development

      # Input 2 — a simple text field
      version:
        description: "What version are you deploying? (e.g. v1.0.0)"
        type: string
        required: false
        default: "v1.0.0"

      # Input 3 — a yes/no toggle
      run_tests:
        description: "Should we run tests before deploying?"
        type: boolean
        default: true

jobs:
  learn-variables:
    runs-on: ubuntu-latest

    # ── ENV VARIABLES ────────────────────────────────────────
    # These are like global constants for your workflow.
    # You define them once and use them anywhere below.
    env:
      APP_NAME: "my-coding-adda-app"
      NODE_VERSION: "20"

    steps:
      # ── STEP 1: Show the inputs the user provided ───────────
      - name: "Step 1 - Show user inputs"
        run: |
          echo "==============================="
          echo "  Inputs you provided:"
          echo "==============================="
          echo "Environment : ${{ inputs.environment }}"
          echo "Version     : ${{ inputs.version }}"
          echo "Run Tests   : ${{ inputs.run_tests }}"

      # ── STEP 2: Use env variables ───────────────────────────
      - name: "Step 2 - Use environment variables"
        run: |
          echo "==============================="
          echo "  Environment Variables:"
          echo "==============================="
          echo "App Name     : $APP_NAME"
          echo "Node Version : $NODE_VERSION"

      # ── STEP 3: Use a Secret ────────────────────────────────
      # IMPORTANT: Secrets are set in GitHub Settings, NOT in this file.
      # They are automatically hidden (masked) in logs — you'll see ***
      #
      # HOW TO ADD A SECRET:
      #   1. Go to your repo on GitHub
      #   2. Click Settings → Secrets and Variables → Actions
      #   3. Click "New repository secret"
      #   4. Name: MY_API_KEY   Value: (your actual key)
      #   5. Click Save
      #
      # Then use it here like: ${{ secrets.MY_API_KEY }}
      - name: "Step 3 - Use a secret"
        env:
          # Map the secret to a local env variable for this step
          MY_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          echo "==============================="
          echo "  Secrets:"
          echo "==============================="
          echo "API Key is set: ${{ secrets.MY_API_KEY != '' }}"
          echo "First 4 chars: ${MY_KEY:0:4}****"
          # ⚠️ Never print the full secret! GitHub will mask it anyway.

      # ── STEP 4: Use a Variable (from Settings) ──────────────
      # Variables are like secrets but NOT hidden in logs.
      # Use them for non-sensitive config like URLs, region names.
      #
      # HOW TO ADD A VARIABLE:
      #   1. Settings → Secrets and Variables → Actions → Variables tab
      #   2. Click "New repository variable"
      #   3. Name: APP_URL   Value: https://myapp.com
      - name: "Step 4 - Use a repository variable"
        run: |
          echo "App URL from Settings: ${{ vars.APP_URL }}"

      # ── STEP 5: Create a variable on the fly ────────────────
      # Sometimes you need to calculate a value and pass it to the next step.
      # Write it to $GITHUB_ENV to make it available in later steps.
      - name: "Step 5 - Create a dynamic variable"
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          echo "Created variable TODAY = $TODAY"

      - name: "Step 6 - Use the dynamic variable from Step 5"
        run: |
          echo "Today's date is: $TODAY"

      # ── STEP 7: Conditional steps based on inputs ───────────
      - name: "Step 7a - Run tests (only if user said yes)"
        if: inputs.run_tests == true
        run: |
          echo "✅ Running tests..."
          echo "   (Your actual test command goes here, like: npm test)"

      - name: "Step 7b - Skip tests (if user said no)"
        if: inputs.run_tests == false
        run: |
          echo "⏭️ Skipping tests as requested."

      - name: "Step 7c - Production warning"
        if: inputs.environment == 'production'
        run: |
          echo "🚨 You are deploying to PRODUCTION!"
          echo "   Environment : ${{ inputs.environment }}"
          echo "   Version     : ${{ inputs.version }}"

      # ── STEP 8: Summary ─────────────────────────────────────
      - name: "Step 8 - Final summary"
        run: |
          echo "==============================="
          echo "  All done!"
          echo "==============================="
          echo "App     : $APP_NAME"
          echo "Target  : ${{ inputs.environment }}"
          echo "Version : ${{ inputs.version }}"
          echo "Date    : $TODAY"